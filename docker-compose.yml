name: todolist

services:
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    image: todolist-backend
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_PATH: /data/todolist.db
      CORS_ORIGIN: http://localhost:8081
    volumes:
      - todolist-data:/data
    ports:
      - "3000:3000"
    networks:
      - todolist
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    image: todolist-frontend
    ports:
      - "8081:80"
    networks:
      - todolist
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 3s
    restart: unless-stopped

networks:
  todolist:
    driver: bridge

volumes:
  todolist-data:
