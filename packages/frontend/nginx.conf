worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  # Hide the nginx version banner.
  server_tokens off;

  # ---------------------------------------------------------------------------
  # Security headers (apply to every response). nginx's `add_header` does NOT
  # inherit into nested location blocks once any add_header is declared there,
  # so each location that needs custom headers re-declares its own — see the
  # static-asset block below for the cache-control header that has to repeat
  # the security set. The `always` flag makes nginx emit the header on error
  # responses too (4xx / 5xx).
  # ---------------------------------------------------------------------------

  map $sent_http_content_type $csp_value {
    default "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'";
  }

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Defence-in-depth headers. CSP is conservative: same-origin only, no
    # inline scripts, inline styles allowed (Tailwind v4 ships a single CSS
    # file but the React renderer occasionally inserts inline style attrs;
    # tightening to 'self' only would require eliminating every dynamic
    # `style` attr in the codebase). Strict-Transport-Security is harmless
    # over HTTP — browsers ignore it — and active when the FE is fronted
    # by HTTPS in production.
    add_header Content-Security-Policy   $csp_value always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy   "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Reverse-proxy the API so the FE bundle uses a relative same-origin URL
    # in dev (Vite proxy) and prod (this block). See ADR-0023.
    # The trailing slash on proxy_pass strips the `/api/` prefix so the BE
    # keeps its bare /tasks routes.
    location /api/ {
      proxy_pass http://backend:3000/;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Re-emit the security headers — `add_header` does not inherit once a
      # location block declares any of its own.
      add_header Content-Security-Policy   $csp_value always;
      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
      add_header X-Content-Type-Options    "nosniff" always;
      add_header X-Frame-Options           "DENY" always;
      add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }

    location = /healthz {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
      expires 1y;
      add_header Cache-Control             "public, immutable" always;
      add_header Content-Security-Policy   $csp_value always;
      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
      add_header X-Content-Type-Options    "nosniff" always;
      add_header X-Frame-Options           "DENY" always;
      add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    }
  }
}
